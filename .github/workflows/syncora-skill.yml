name: Syncora Skill

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: syncora-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        node:
          - 22
          - 24

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install the dependency-free development package
        run: npm ci --ignore-scripts
      - name: Run release, syntax, and runtime checks
        run: npm run check
      - name: Smoke-test reversible legacy adoption from an installed copy
        run: npm run smoke:adoption

  installer-smoke:
    name: Skills CLI installer smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SKILLS_CLI_VERSION: "1.5.18"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - name: Install the dependency-free development package
        run: npm ci --ignore-scripts
      - name: Install through the pinned Skills CLI
        run: npm run smoke:install
